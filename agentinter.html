<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Verification</title>
<style>

body {
  font-family: Arial, sans-serif;
  background-color: #f4f4f4;
  margin: 0;
  padding: 0;
  background-image: url(back\ groung\ pic.jpg);
  background-position: center;
  background-repeat: no-repeat;
  background-size: auto;


}

.container {
  max-width: 500px;
  margin: 50px auto;
  background-image: linear-gradient(rgba(122, 163, 122, 0.7),rgba(72, 89, 72, 0.7));
  padding: 20px;
  border-radius: 8px;
  box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
  margin-top: 14% ;
}

h2 {
  text-align: center;
  color: red;
}

.form-group {
  margin-bottom: 20px;
}

label {
  font-weight: bold;
}

input[type="text"], input[type="email"], input[type="password"] {
  width: 100%;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 4px;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 10px;
  background-color: #007bff;
  color: #fff;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

button:hover {
  background-color: #0056b3;
}

.error-message {
  color: red;
  font-size: 14px;
  margin-top: 5px;
}

.success-message {
  color: green;
  font-size: 14px;
  margin-top: 5px;
}
</style>
</head>
<body>

<div class="container">
  <h2>Verification of parking token</h2>
  <form id="verificationForm" onsubmit="return verify()">
    <div class="form-group">
      <label for="agentID">Name of the customer:</label>
      <input type="text" id="agentID" name="agentID" required>
    </div>
    <div class="form-group">
      <label for="slotID">Slot id:</label>
      <input type="text" id="slotID" name="slotID" required>
    </div>
    <button type="submit">Verify</button>
    <div id="errorMessage" class="error-message" style="display: none;"></div>
    <div id="successMessage" class="success-message" style="display: none;">Verification Successful!</div>
  </form>
</div>

<script>
const verification_page = {
    "SLOTID1": "Slot 1",
    "SLOTID2": "Slot 2",
    "SLOTID3": "Slot 3",
    "SLOTID4": "SLot 4",
    "SLOTID5": "Slot 5",
    "SLOTID6": "Slot 6",
    "SLOTID7": "Slot 7",
    "SLOTID8": "Slot 8",
    "SLOTID9": "Slot 9",
    "SLOTID10": "Slot 10",
    "SLOTID11": "Slot 11",
    "SLOTID12": "Slot 12",
    "SLOTID13": "Slot 13",
    "SLOTID14": "Slot 14",
    "SLOTID15": "Slot 15",
    "SLOTID16": "Slot 16",
    "SLOTID17": "Slot 17",
    "SLOTID18": "Slot 18",
    "SLOTID19": "Slot 19",
    "SLOTID20": "Slot 20"
};

// Simulated agent verification logic
function verify(){
    var slotID = document.getElementById("slotID").value;
    if (slotID in verification_page){
        alert("Verification Successfully completed. Slot allotted to customer is: " + verification_page[slotID]);
        window.location.href="home.html";
        return false;
    } else {
        alert("Verification failed. Slot ID does not exist");
        return false;
    }
}
</script>
</body>
</html>
